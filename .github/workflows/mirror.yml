name: Mirror from sr.ht

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:  # manual trigger

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clone from sr.ht and push to GitHub
        run: |
          git clone --mirror https://git.sr.ht/~ahxxm/ic source
          cd source
          git remote add github https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push github --all --force
          git push github --tags --force
